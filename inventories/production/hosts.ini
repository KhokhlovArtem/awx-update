[webservers]
web01.example.com ansible_user=admin
web02.example.com ansible_user=admin

[databases]
db01.example.com ansible_user=admin
db02.example.com ansible_user=admin

[all:vars]
# Глобальные переменные для всех хостов
ansible_python_interpreter=/usr/bin/python3
ansible_become_method=sudo

# Настройки обновлений
update_level=security
auto_reboot=false
update_serial=25%

[production:children]
webservers
databases

[production:vars]
# Переменные только для production окружения
backup_before_update=true
send_notifications=true
