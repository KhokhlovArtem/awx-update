---
- name: "БЕЗОПАСНАЯ ПЕРЕЗАГРУЗКА СЕРВЕРОВ"
  hosts: "{{ target_hosts | default('all') }}"
  become: yes
  gather_facts: yes

  serial: 1

  vars:
    log_dir: "/var/log/ansible-updates"
    reboot_timeout: 600
    wait_for_services: 120

  tasks:
    - name: "Поиск файлов-триггеров перезагрузки"
      find:
        paths: "{{ log_dir }}"
        patterns: "reboot-required-*.txt"
      register: reboot_triggers

    - name: "Проверка необходимости перезагрузки"
      debug:
        msg: "Хост {{ inventory_hostname }} не требует перезагрузки"
      when: reboot_triggers.files | length == 0

    - name: "БЛОК ПЕРЕЗАГРУЗКИ"
      when: reboot_triggers.files | length > 0
      block:
        - name: "Предупреждение о перезагрузке"
          debug:
            msg:
              - "ПЕРЕЗАГРУЗКА ХОСТА {{ inventory_hostname }}"
              - "Причина: {{ lookup('file', reboot_triggers.files[0].path) }}"

        - name: "Ожидание 10 секунд перед перезагрузкой"
          wait_for:
            timeout: 10
          delegate_to: localhost

        - name: "Перезагрузка сервера"
          reboot:
            reboot_timeout: "{{ reboot_timeout }}"
            pre_reboot_delay: 5
            post_reboot_delay: "{{ wait_for_services }}"
            msg: "Плановая перезагрузка после обновления безопасности"
          register: reboot_result

        - name: "Проверка доступности SSH"
          wait_for:
            host: "{{ inventory_hostname }}"
            port: 22
            delay: 10
            timeout: "{{ reboot_timeout }}"
          delegate_to: localhost

        - name: "Проверка доступности серверов"
          ping:

        - name: "Удаление триггеров перезагрузки"
          file:
            path: "{{ reboot_triggers.files[0].path }}"
            state: absent

        - name: "УСПЕШНАЯ ПЕРЕЗАГРУЗКА"
          debug:
            msg: "Хост {{ inventory_hostname }} успешно перезагружен"
